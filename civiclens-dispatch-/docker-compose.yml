# docker-compose.yml
# Defines the CivicLens Dispatch stack and how to run it.
#
# This file goes at the PROJECT ROOT:
#   civiclens-dispatch-/docker-compose.yml
# NOT inside backend/ or frontend/.
#
# Commands:
#   docker compose up --build   Build images and start everything
#   docker compose up -d        Start in background (detached)
#   docker compose down         Stop and remove containers
#   docker compose logs -f      Follow logs from all services
#   docker compose logs backend Logs from backend only
#
# Day 68: Docker containerization
# (version: field removed — obsolete in Docker Compose v2+)


# ============================================================
# SERVICES
# Each service is one container.
# Right now: just the backend.
# When we add PostgreSQL, it becomes a second service here.
# ============================================================

services:

  # ------------------------------------------------------------
  # BACKEND — FastAPI Python application
  # ------------------------------------------------------------

  backend:

    # Build the image using backend/Dockerfile
    # context = the folder Docker uses as the root when building
    #   (everything in backend/ is available during the build)
    # dockerfile = which Dockerfile to use inside that folder
    build:
      context: ./backend
      dockerfile: Dockerfile

    # Name the running container — easier to reference in logs and commands
    container_name: civiclens-backend

    # Map port 8000 on your Mac to port 8000 inside the container
    # Format: "host_port:container_port"
    # Without this mapping you can't reach the API from your browser
    ports:
      - "8000:8000"

    # Load environment variables from your .env file at runtime
    # This is the safe way to pass secrets — they're injected when the
    # container starts, never baked into the image itself
    env_file:
      - ./backend/.env

    # Override or add specific environment variables
    # These take precedence over the same variable in .env
    environment:
      # Tell the app it's running in development mode
      - ENVIRONMENT=development
      # Python module search path — so imports work from /app
      - PYTHONPATH=.
      # Disable output buffering so logs appear immediately
      - PYTHONUNBUFFERED=1

    # Volumes mount folders from your Mac into the container
    # Without volumes, files written inside the container disappear on restart
    volumes:
      # Uploaded audio and images survive container restarts
      # Left = path on your Mac, Right = path inside the container
      - ./backend/app/media:/app/app/media

      # SQLite database survives container restarts
      # Without this, every restart starts with an empty database
      - ./backend/civiclens.db:/app/civiclens.db



    # Restart the container automatically if it crashes
    # "unless-stopped" = restart always, unless you explicitly run docker compose down
    restart: unless-stopped

    # Health check — Docker periodically verifies the app is actually responding
    # (not just running but genuinely handling requests)
    healthcheck:
      # Hit /health and check it returns HTTP 200
      # --fail = non-zero exit code on HTTP error
      # --silent = suppress curl progress output
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]

      # Run the health check every 30 seconds
      interval: 30s

      # Wait up to 10 seconds for a response before failing
      timeout: 10s

      # Mark unhealthy after 3 consecutive failures
      retries: 3

      # Wait 15 seconds after startup before first check
      # (the app needs a moment to initialize before it can respond)
      start_period: 15s


# ============================================================
# NETWORKS
# Docker creates an internal network so services can reach each other.
# When we add PostgreSQL, the backend connects to it using
# the service name "db" as the hostname instead of "localhost".
# ============================================================

networks:
  default:
    # Give the network a recognizable name
    name: civiclens-network